{% extends "base.html" %}

{% block title %}Search{% endblock %}

{% block content %}

<div class="container mt-5">

<h2>
Results for "{{ keyword }}"
</h2>

{% if results %}

{% for topic, content in results %}

<div class="card p-4 mb-3">

<h4>{{ topic }}</h4>

<p>{{ content[:250] }}...</p>

</div>

{% endfor %}

{% else %}

<div class="alert alert-warning">

No results found.

</div>

{% endif %}

</div>

{% endblock %}
