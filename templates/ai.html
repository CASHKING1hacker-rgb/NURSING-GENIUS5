{% extends "base.html" %}

{% block title %}AI Tutor | Nursing Genius{% endblock %}

{% block content %}

<div class="card">

    <h1>🤖 Nursing Genius AI Tutor</h1>
    
    <p>
    Developed by CASH KING1
    </p>

    <form method="POST">

        <input
            type="text"
            name="question"
            placeholder="Ask any nursing question..."
            style="width:100%;padding:12px;"
            required
            autocomplete="off">

        <br><br>

        <button class="button" type="submit">
            Ask AI
        </button>

    </form>

    <hr>

    {% if answer %}
        {{ answer|safe }}
    {% endif %}

</div>

{% endblock %}
