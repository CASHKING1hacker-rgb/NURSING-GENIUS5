{% extends "base.html" %}

{% block title %}My Profile{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="card p-4 text-center">

<img src="{{ url_for('static', filename='profiles/' + user[2]) }}"
width="120"
height="120"
class="rounded-circle mb-3">

<h2>{{ user[0] }}</h2>

<p>{{ user[1] }}</p>

<hr>

<h4>⭐ XP</h4>
<h2>{{ user[3] }}</h2>

<hr>

<h4>🔥 Study Streak</h4>
<h2>{{ user[4] }} Days</h2>

<hr>

<h4>🏅 Badges</h4>

<p>{{ user[5] }}</p>

</div>

</div>

{% endblock %}
